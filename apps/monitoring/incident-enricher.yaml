apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-enricher
  namespace: monitoring
  labels: { app: incident-enricher }
spec:
  replicas: 1
  selector:
    matchLabels: { app: incident-enricher }
  template:
    metadata:
      labels: { app: incident-enricher }
    spec:
      containers:
        - name: incident-enricher
          image: incident-enricher:0.3.1   # fix NaN del SLI
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: argocd-enricher-token
                  key: token
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: incident-enricher
  namespace: monitoring
  labels: { app: incident-enricher }
spec:
  selector:
    app: incident-enricher
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
