apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-enricher
  namespace: monitoring
  labels: { app: incident-enricher }
spec:
  replicas: 1
  selector:
    matchLabels: { app: incident-enricher }
  template:
    metadata:
      labels: { app: incident-enricher }
    spec:
      containers:
        - name: incident-enricher
          image: incident-enricher:0.4.0   # 5C: capa LLM (Gemini)
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: argocd-enricher-token
                  key: token
            # API key de Gemini, inyectada desde su Secret (fuera de Git).
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: api-key
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: incident-enricher
  namespace: monitoring
  labels: { app: incident-enricher }
spec:
  selector:
    app: incident-enricher
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
