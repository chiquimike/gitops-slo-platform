# ═══════════════════════════════════════════════════════════════════════════
# Deployment + Service del incident-enricher.
# 5B (2do incremento): inyecta el token de Argo (Secret) como variable de entorno.
# Vive en 'monitoring' porque es parte de la plataforma que observa, no la app.
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-enricher
  namespace: monitoring
  labels: { app: incident-enricher }
spec:
  replicas: 1
  selector:
    matchLabels: { app: incident-enricher }
  template:
    metadata:
      labels: { app: incident-enricher }
    spec:
      containers:
        - name: incident-enricher
          image: incident-enricher:0.3.0   # 5B-2: integración con Argo CD API
          imagePullPolicy: IfNotPresent   # usa la imagen importada a k3d (no registry)
          ports:
            - containerPort: 8000
          env:
            # El token de Argo se inyecta DESDE el Secret (creado imperativamente,
            # fuera de Git). El deployment solo REFERENCIA el Secret por nombre;
            # el valor del token nunca aparece en este manifiesto versionado.
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: argocd-enricher-token
                  key: token
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: incident-enricher
  namespace: monitoring
  labels: { app: incident-enricher }
spec:
  selector:
    app: incident-enricher
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP   # interno: Alertmanager lo alcanza por DNS interno
