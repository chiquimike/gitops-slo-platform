# ═══════════════════════════════════════════════════════════════════════════
# Service de Grafana — acceso a la UI (puerto 3000) vía port-forward.
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels: { app: grafana }
spec:
  selector:
    app: grafana           # coincide con las labels del pod del Deployment
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP          # interno; acceso vía port-forward
