# ═══════════════════════════════════════════════════════════════════════════
# PROVIDER de dashboards — le dice a Grafana "carga dashboards desde /var/lib/
# grafana/dashboards al arrancar". Es el equivalente al datasources.yaml pero
# para dashboards. Sin esto, Grafana no busca dashboards en archivos.
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          # Carpeta DENTRO del pod donde Grafana buscará los .json de dashboards.
          # Ahí montaremos el ConfigMap que contiene el JSON del dashboard.
          path: /var/lib/grafana/dashboards
